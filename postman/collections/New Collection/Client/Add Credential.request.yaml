$kind: http-request
name: Add Credential
url: "{{base_url}}/api/client/:id/credential"
method: POST
headers:
  - key: Authorization
    value: "Bearer {{token}}"
  - key: Content-Type
    value: application/json
urlParameters:
  - key: id
    value: CLIENT_ID_HERE
body:
  mode: raw
  raw: |
    {
      "key": "webhook_url",
      "value": "https://yourdomain.com/webhook/telegram"
    }
  options:
    raw:
      language: json
order: 6
