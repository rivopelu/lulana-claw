$kind: http-request
name: Update Credential
url: "{{base_url}}/api/client/:id/credential/:credentialId"
method: PUT
headers:
  - key: Authorization
    value: "Bearer {{token}}"
  - key: Content-Type
    value: application/json
urlParameters:
  - key: id
    value: CLIENT_ID_HERE
  - key: credentialId
    value: CREDENTIAL_ID_HERE
body:
  mode: raw
  raw: |
    {
      "key": "bot_token",
      "value": "NEW_BOT_TOKEN_HERE"
    }
  options:
    raw:
      language: json
order: 7