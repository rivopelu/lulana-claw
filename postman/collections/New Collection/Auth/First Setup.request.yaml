$kind: http-request
name: First Setup
url: "{{base_url}}/api/auth/setup"
method: POST
headers:
  - key: Content-Type
    value: application/json
body:
  mode: raw
  raw: |
    {
      "name": "Admin",
      "email": "admin@example.com",
      "password": "password123"
    }
  options:
    raw:
      language: json
order: 1
